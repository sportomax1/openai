<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat вЂ” Pizza, Basketball, Mario Kart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .chat-container { height: calc(100vh - 220px); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Debug panel */
        #debug-panel {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.45;
            background: #1e1e1e;
            color: #d4d4d4;
            max-height: 260px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        #debug-panel.collapsed { max-height: 0; padding: 0 12px; }
        .dbg-info  { color: #569cd6; }
        .dbg-ok    { color: #6a9955; }
        .dbg-warn  { color: #dcdcaa; }
        .dbg-error { color: #f44747; }
        .dbg-net   { color: #ce9178; }
        .dbg-time  { color: #808080; }
        .dbg-json  { color: #9cdcfe; }

        /* Enhanced message styling */
        .msg-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .msg-ai {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* Markdown table styling */
        .msg-ai table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
            font-size: 13px;
        }
        .msg-ai table th {
            background: #f1f5f9;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }
        .msg-ai table td {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
        }
        .msg-ai table tr:nth-child(even) {
            background: #f8fafc;
        }
        .msg-ai table tr:hover {
            background: #f1f5f9;
        }

        /* Markdown code styling */
        .msg-ai code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #d63384;
        }
        .msg-ai pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .msg-ai pre code {
            background: none;
            color: #f8f8f2;
            padding: 0;
        }

        /* Resend button */
        .resend-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: #e2e8f0;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .resend-btn:hover {
            background: #cbd5e1;
            color: #0f172a;
            transform: scale(1.05);
        }
        .resend-btn:active {
            transform: scale(0.95);
        }

        /* Suggestions */
        #suggestions-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-top: 1px solid #e2e8f0;
            padding-top: 8px;
        }
        .suggestion-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            background: linear-gradient(135deg, #f0f4ff 0%, #fff0f6 100%);
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .suggestion-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #e0e7ff 0%, #fdf2f8 100%);
            color: #667eea;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        .suggestion-btn:active {
            transform: translateY(0);
        }

        /* Emoji support */
        .emoji { display: inline-block; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <!-- HEADER -->
    <header class="glass border-b-2 border-purple-200 p-4 sticky top-0 z-10 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-600 to-red-600">
                рџЌ• рџЏЂ рџЏЋпёЏ Expert Chat
            </h1>
            <div class="flex items-center gap-3">
                <span id="status-badge" class="text-xs font-mono text-gray-600 bg-gray-100 px-2 py-1 rounded-full">idle</span>
                <button id="debug-toggle" onclick="toggleDebug()"
                    class="text-xs font-mono bg-gray-800 text-green-400 px-2 py-1 rounded hover:bg-gray-700 transition">
                    рџђ› Debug
                </button>
            </div>
        </div>
    </header>

    <!-- DEBUG PANEL (collapsible) -->
    <div id="debug-panel" class="px-3 py-2 border-b border-gray-700"></div>

    <!-- CHAT WINDOW -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 chat-container max-w-4xl mx-auto w-full"></main>

    <!-- INPUT & SUGGESTIONS -->
    <footer class="glass border-t-2 border-purple-200 p-4 sticky bottom-0 shadow-lg">
        <div class="max-w-4xl mx-auto">
            <!-- Suggestions -->
            <div id="suggestions-container"></div>
            
            <!-- Input form -->
            <form id="chat-form" class="flex gap-3">
                <input type="text" id="user-input" autocomplete="off" placeholder="Ask about pizza рџЌ•, basketball рџЏЂ, or Mario Kart 64 рџЏЋпёЏвЂ¦"
                    class="flex-1 p-3 border-2 border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 shadow-sm transition-all">
                <button type="submit" id="send-btn"
                    class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-2 rounded-2xl font-semibold hover:shadow-lg shadow-md transition-all transform hover:scale-105 active:scale-95">
                    Send рџљЂ
                </button>
            </form>
        </div>
    </footer>

    <script>
    // ============================================================
    //  SUGGESTION SYSTEM вЂ” context-aware follow-up questions
    // ============================================================
    const suggestionsDb = {
      pizza: [
        "What's the best pizza topping combination? рџЌ•",
        "How do you make authentic Neapolitan pizza? рџ”Ґ",
        "Compare different pizza styles (NY vs Chicago) рџ“Љ",
        "What's the history of pizza Margherita? рџ‡®рџ‡№",
        "Best pizza restaurants in major cities рџ—єпёЏ",
        "How to make homemade pizza dough рџ‘ЁвЂЌрџЌі",
      ],
      basketball: [
        "Who are the best NBA players right now? рџЏ†",
        "Explain basketball rules for beginners вљЅ",
        "Compare legendary NBA teams and players рџ“Љ",
        "What's the best basketball training routine? рџ’Є",
        "NBA playoffs winners by decade рџ“…",
        "How to improve basketball shooting skills? рџЋЇ",
      ],
      mario_kart: [
        "What are the best Mario Kart 64 characters? рџЏЋпёЏ",
        "How to win on each Mario Kart 64 track? рџЏЃ",
        "Mario Kart 64 cheats and shortcuts рџљЂ",
        "Fastest strategies for Mario Kart 64 рџЋ®",
        "Best items to use in Mario Kart 64? рџЋЃ",
        "Mario Kart 64 vs modern Mario Kart games? рџ“€",
      ],
      general: [
        "Tell me about pizza рџЌ•",
        "Tell me about basketball рџЏЂ",
        "Tell me about Mario Kart 64 рџЏЋпёЏ",
      ],
    };

    const suggestionsContainer = document.getElementById('suggestions-container');
    let lastTopic = 'general';

    function detectTopic(text) {
      const lower = text.toLowerCase();
      if (lower.includes('pizza') || lower.includes('dough') || lower.includes('topping') || lower.includes('restaurant') || lower.includes('margherita')) {
        return 'pizza';
      }
      if (lower.includes('basketball') || lower.includes('nba') || lower.includes('player') || lower.includes('shoot') || lower.includes('court')) {
        return 'basketball';
      }
      if (lower.includes('mario kart') || lower.includes('n64') || lower.includes('track') || lower.includes('character') || lower.includes('kart 64')) {
        return 'mario_kart';
      }
      return lastTopic;
    }

    function showSuggestions(topic = 'general') {
      lastTopic = topic;
      const suggestions = suggestionsDb[topic] || suggestionsDb['general'];
      
      // Shuffle and pick 3-4 random suggestions
      const shuffled = [...suggestions].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, Math.min(4, suggestions.length));

      suggestionsContainer.innerHTML = '';
      selected.forEach(suggestion => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'suggestion-btn';
        btn.textContent = suggestion;
        btn.onclick = (e) => {
          e.preventDefault();
          input.value = suggestion;
          form.dispatchEvent(new Event('submit'));
        };
        suggestionsContainer.appendChild(btn);
      });
    }

    // ============================================================
    //  DEBUG LOGGER вЂ” shows everything in the on-page debug panel
    // ============================================================
    const debugPanel = document.getElementById('debug-panel');
    const statusBadge = document.getElementById('status-badge');
    let debugVisible = true;
    let requestCounter = 0;
    let lastUserMessage = '';  // Store for resending

    function toggleDebug() {
        debugVisible = !debugVisible;
        debugPanel.classList.toggle('collapsed', !debugVisible);
        document.getElementById('debug-toggle').textContent = debugVisible ? 'рџђ› Debug' : 'рџђ› Show';
    }

    function dbg(cls, ...parts) {
        const ts = new Date().toISOString().slice(11, 23);
        const line = document.createElement('div');
        line.innerHTML = `<span class="dbg-time">[${ts}]</span> <span class="${cls}">${parts.join(' ')}</span>`;
        debugPanel.appendChild(line);
        debugPanel.scrollTop = debugPanel.scrollHeight;

        const plain = `[${ts}] ${parts.join(' ')}`;
        if (cls === 'dbg-error') console.error(plain);
        else if (cls === 'dbg-warn') console.warn(plain);
        else console.log(`%c${plain}`, cls === 'dbg-ok' ? 'color:green' : cls === 'dbg-net' ? 'color:orange' : 'color:deepskyblue');
    }

    function setStatus(text, color = 'gray') {
        statusBadge.textContent = text;
        statusBadge.className = `text-xs font-mono px-2 py-1 rounded-full bg-${color}-100 text-${color}-700`;
    }

    // ============================================================
    //  CHAT UI
    // ============================================================
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const chatWindow = document.getElementById('chat-window');
    const btn = document.getElementById('send-btn');

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function sendMessage(msg) {
        input.value = msg;
        form.dispatchEvent(new Event('submit'));
    }

    function appendMessage(text, isUser = false, meta = {}) {
        const wrapper = document.createElement('div');
        wrapper.className = isUser ? 'flex justify-end' : 'flex justify-start';

        const div = document.createElement('div');
        div.className = isUser
            ? 'msg-user text-white p-4 rounded-3xl rounded-tr-none shadow-lg max-w-[85%] break-words'
            : 'msg-ai p-4 rounded-3xl rounded-tl-none max-w-[85%] text-gray-800 prose prose-sm max-w-none';

        // Parse markdown for AI responses
        let html = isUser ? escapeHtml(text) : marked.parse(text);
        
        // Add emoji support for common topics
        if (!isUser) {
            html = html
                .replace(/pizza/gi, 'рџЌ• $&')
                .replace(/basketball/gi, 'рџЏЂ $&')
                .replace(/mario ?kart/gi, 'рџЏЋпёЏ $&')
                .replace(/nba/gi, 'рџЏЂ $&')
                .replace(/nfl/gi, 'рџЏ€ $&');
        }
        
        div.innerHTML = html;

        // Show model badge + resend button under AI messages
        if (!isUser && meta.model) {
            const footer = document.createElement('div');
            footer.className = 'mt-3 flex items-center justify-between';
            
            const badge = document.createElement('div');
            badge.className = 'text-[10px] font-mono text-gray-500';
            badge.textContent = `рџ’« ${meta.model}  вЂў  ${meta.latency ?? '?'}ms`;
            
            const resendBtn = document.createElement('button');
            resendBtn.className = 'resend-btn';
            resendBtn.textContent = 'в†©пёЏ Resend';
            resendBtn.onclick = (e) => {
                e.preventDefault();
                if (lastUserMessage) {
                    sendMessage(lastUserMessage);
                }
            };
            
            footer.appendChild(badge);
            footer.appendChild(resendBtn);
            div.appendChild(footer);
        }

        wrapper.appendChild(div);
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ============================================================
    //  FORM SUBMIT вЂ” with full debug instrumentation
    // ============================================================
    form.onsubmit = async (e) => {
        e.preventDefault();
        const msg = input.value.trim();
        if (!msg) return;

        lastUserMessage = msg;  // Save for resend
        requestCounter++;
        const rid = requestCounter;
        dbg('dbg-info', `в”Ѓв”Ѓв”Ѓ REQUEST #${rid} в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ`);
        dbg('dbg-info', `User message (${msg.length} chars): "${msg.length > 100 ? msg.slice(0, 100) + 'вЂ¦' : msg}"`);

        appendMessage(msg, true);
        input.value = '';
        btn.disabled = true;
        btn.innerText = 'вЏі';
        setStatus('thinkingвЂ¦', 'yellow');

        const payload = JSON.stringify({ message: msg });
        dbg('dbg-net', `POST /api/chat  payload=${payload.length} bytes`);

        const t0 = performance.now();
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload,
            });
            const elapsed = Math.round(performance.now() - t0);
            dbg('dbg-net', `Response: HTTP ${res.status} ${res.statusText}  (${elapsed}ms round-trip)`);

            res.headers.forEach((v, k) => dbg('dbg-json', `  header  ${k}: ${v}`));

            let data;
            const rawText = await res.text();
            dbg('dbg-json', `Raw body (${rawText.length} chars): ${rawText.slice(0, 400)}${rawText.length > 400 ? 'вЂ¦' : ''}`);

            try {
                data = JSON.parse(rawText);
            } catch (jsonErr) {
                dbg('dbg-error', `JSON parse failed: ${jsonErr.message}`);
                appendMessage(`_Error: server returned non-JSON response (HTTP ${res.status})._`);
                setStatus('JSON error', 'red');
                return;
            }

            if (data.debug && Array.isArray(data.debug)) {
                dbg('dbg-info', `Server debug trail (${data.debug.length} entries):`);
                data.debug.forEach((d, i) => {
                    dbg('dbg-json', `  [${i}] ${JSON.stringify(d)}`);
                });
            }

            if (res.ok) {
                dbg('dbg-ok', `вњ… Reply OK  model=${data.model_used || '?'}  reply_len=${(data.reply||'').length}  latency=${data.latency_ms ?? elapsed}ms`);
                setStatus(`вњ“ ${data.model_used || 'ok'}`, 'green');
                appendMessage(data.reply || '(empty reply)', false, {
                    model: data.model_used,
                    latency: data.latency_ms ?? elapsed,
                });
                // Show context-aware suggestions based on the user's message
                const detectedTopic = detectTopic(msg);
                showSuggestions(detectedTopic);
            } else {
                dbg('dbg-error', `вќЊ HTTP ${res.status} вЂ” ${data.reply || rawText.slice(0, 200)}`);
                setStatus(`error ${res.status}`, 'red');
                appendMessage(`_Error (${res.status}): ${data.reply || 'Unknown server error.'}_`);
                // Still show suggestions even on error
                showSuggestions(detectTopic(msg));
            }

        } catch (err) {
            const elapsed = Math.round(performance.now() - t0);
            dbg('dbg-error', `рџ”Ґ Network/fetch exception after ${elapsed}ms: ${err.message}`);
            dbg('dbg-error', `Stack: ${err.stack}`);
            setStatus('network error', 'red');
            appendMessage('_Error: Could not connect to AI server. Check the debug panel for details._');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Send рџљЂ';
            dbg('dbg-info', `в”Ѓв”Ѓв”Ѓ END REQUEST #${rid} в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ`);
        }
    };

    // ============================================================
    //  STARTUP
    // ============================================================
    dbg('dbg-ok', 'рџљЂ Chat app loaded');
    dbg('dbg-info', `User-Agent: ${navigator.userAgent}`);
    dbg('dbg-info', `Location: ${location.href}`);
    dbg('dbg-info', `Marked.js version: ${typeof marked !== 'undefined' ? (marked.version || 'loaded') : 'MISSING вљ пёЏ'}`);
    setStatus('ready', 'green');
    appendMessage("рџЋ‰ Hey there! I'm your expert on:\nвЂў **Pizza рџЌ•** (recipes, history, styles, toppings)\nвЂў **Basketball рџЏЂ** (NBA, rules, players, teams)\nвЂў **Mario Kart 64 рџЏЋпёЏ** (characters, tracks, strategies)\n\nAsk me anything about these topics!");
    // Show initial suggestions
    showSuggestions('general');
    </script>
</body>
</html>
