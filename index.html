<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Debugger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
      flex: 1;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .quick-prompts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .quick-btn {
      padding: 12px 16px;
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #666;
    }

    .quick-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
      transform: translateY(-2px);
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
      box-shadow: none;
    }

    .output-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
      flex: 1;
    }

    .response-box {
      background: #f9f9f9;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      min-height: 160px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .response-box.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
    }

    .response-box.error {
      background: #ffebee;
      border-color: #ef5350;
      color: #c62828;
    }

    .response-box.success {
      background: #f1f8e9;
      border-color: #7cb342;
      color: #33691e;
    }

    .console-box {
      background: #1e1e1e;
      border: 2px solid #333;
      border-radius: 10px;
      padding: 15px;
      min-height: 180px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #00ff00;
    }

    .log-entry {
      margin-bottom: 8px;
      padding: 4px;
      border-left: 3px solid #00ff00;
      padding-left: 12px;
    }

    .log-entry.info {
      color: #00bfff;
      border-left-color: #00bfff;
    }

    .log-entry.error {
      color: #ff6b6b;
      border-left-color: #ff6b6b;
    }

    .log-entry.warn {
      color: #ffd700;
      border-left-color: #ffd700;
    }

    .timestamp {
      color: #666;
      font-size: 10px;
      opacity: 0.7;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(102, 126, 234, 0.3);
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7cb342;
      margin-right: 8px;
    }

    .status-indicator.loading {
      background: #ffd700;
    }

    .status-indicator.error {
      background: #ef5350;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .quick-prompts {
        grid-template-columns: 1fr;
      }
    }

    .clear-btn {
      padding: 8px 12px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .clear-btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- Input Panel -->
    <div class="card">
      <h2>🤖 AI Prompt</h2>
      
      <div class="input-section">
        <textarea id="prompt" placeholder="Enter your prompt here... or use quick buttons below!"></textarea>

        <div>
          <label style="font-weight: 600; font-size: 12px; color: #666;">Quick Prompts:</label>
          <div class="quick-prompts">
            <button class="quick-btn" onclick="setPrompt('Hello, how are you?')">👋 Greeting</button>
            <button class="quick-btn" onclick="setPrompt('What is 2 + 2?')">🧮 Math</button>
            <button class="quick-btn" onclick="setPrompt('Tell me a joke')">😂 Joke</button>
            <button class="quick-btn" onclick="setPrompt('Explain quantum computing')">🔬 Tech</button>
          </div>
        </div>

        <div class="button-group">
          <button class="btn" onclick="ask()">Send</button>
          <button class="btn btn-secondary" onclick="clearInput()">Clear</button>
        </div>

        <div class="status-bar">
          <span>
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">Ready</span>
          </span>
          <span id="responseTime"></span>
        </div>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="card">
      <h2>📊 Response & Logs</h2>
      
      <div class="output-section">
        <div>
          <label style="font-weight: 600; font-size: 12px; color: #666; display: flex; justify-content: space-between;">
            <span>Response:</span>
            <button class="clear-btn" onclick="clearResponse()">Clear</button>
          </label>
          <div class="response-box" id="output">No response yet. Send a prompt to get started!</div>
        </div>

        <div>
          <label style="font-weight: 600; font-size: 12px; color: #666; display: flex; justify-content: space-between;">
            <span>Console Log:</span>
            <button class="clear-btn" onclick="clearConsole()">Clear</button>
          </label>
          <div class="console-box" id="console">
            <div class="log-entry info"><span class="timestamp">[INIT]</span> Console ready</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const consoleBox = document.getElementById('console');
    const outputBox = document.getElementById('output');
    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const responseTime = document.getElementById('responseTime');

    // Custom console logging
    function addLog(message, type = 'log') {
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${escapeHtml(message)}`;
      consoleBox.appendChild(entry);
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Override console methods
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;

    console.log = function(...args) {
      originalLog(...args);
      addLog(args.join(' '), 'log');
    };

    console.error = function(...args) {
      originalError(...args);
      addLog('ERROR: ' + args.join(' '), 'error');
    };

    console.warn = function(...args) {
      originalWarn(...args);
      addLog('WARN: ' + args.join(' '), 'warn');
    };

    // Helper functions
    function setPrompt(text) {
      document.getElementById('prompt').value = text;
      console.log('Prompt set: ' + text);
    }

    function clearInput() {
      document.getElementById('prompt').value = '';
      console.log('Input cleared');
    }

    function clearResponse() {
      outputBox.textContent = 'Response cleared';
      outputBox.className = 'response-box';
      console.log('Response cleared');
    }

    function clearConsole() {
      consoleBox.innerHTML = '<div class="log-entry info"><span class="timestamp">[INIT]</span> Console cleared</div>';
      console.log('Console cleared');
    }

    function updateStatus(text, type = 'ready') {
      statusText.textContent = text;
      statusIndicator.className = 'status-indicator ' + type;
    }

    async function ask() {
      const prompt = document.getElementById('prompt').value.trim();
      
      if (!prompt) {
        console.warn('No prompt provided');
        updateStatus('No prompt provided', 'error');
        return;
      }

      console.log('Sending prompt to API: ' + prompt);
      updateStatus('Sending...', 'loading');
      outputBox.className = 'response-box loading';
      outputBox.innerHTML = '<div class="spinner"></div> Processing...';

      const startTime = Date.now();

      try {
        console.log('Fetching /api/ask with POST request...');
        
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        console.log('Response status: ' + res.status);

        if (!res.ok) {
          const errorData = await res.json();
          throw new Error(errorData.error || 'Request failed with status ' + res.status);
        }

        const data = await res.json();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);

        console.log('Success! Response received in ' + elapsed + 's');
        console.log('Response text: ' + data.reply);

        outputBox.className = 'response-box success';
        outputBox.textContent = data.reply;
        updateStatus('Success', 'ready');
        responseTime.textContent = elapsed + 's';

      } catch (err) {
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
        console.error('Error: ' + err.message);
        console.error('Stack: ' + err.stack);

        outputBox.className = 'response-box error';
        outputBox.textContent = '❌ Error: ' + err.message + '\n\nMake sure:\n1. API key is set in Vercel env\n2. OpenAI account has credits\n3. Check Vercel function logs for details';
        updateStatus('Error', 'error');
        responseTime.textContent = elapsed + 's';
      }
    }

    // Send on Enter key (Shift+Enter for new line)
    document.getElementById('prompt').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    console.log('App initialized and ready!');
  </script>

</body>
</html>
