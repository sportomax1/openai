<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .chat-container { height: calc(100vh - 140px); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Professional scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <header class="glass border-b border-gray-200 p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Gemini 3 MVP</h1>
            <span class="text-xs font-mono text-gray-400 bg-gray-100 px-2 py-1 rounded">v3.1-flash</span>
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container max-w-4xl mx-auto w-full">
        </main>

    <footer class="p-4 bg-white border-t border-gray-200 sticky bottom-0">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" autocomplete="off" placeholder="Type your message..." 
                class="flex-1 p-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all">
            <button type="submit" id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-semibold hover:bg-blue-700 shadow-md transition-all">
                Send
            </button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const btn = document.getElementById('send-btn');

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const div = document.createElement('div');
            div.className = isUser 
                ? "bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none shadow-sm max-w-[85%]" 
                : "bg-white border border-gray-200 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-gray-800 prose prose-sm";
            
            // Parse Markdown for AI, plain text for User
            div.innerHTML = isUser ? text : marked.parse(text);
            
            wrapper.appendChild(div);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;

            appendMessage(msg, true);
            input.value = '';
            btn.disabled = true;
            btn.innerText = '...';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                appendMessage(data.reply);
            } catch (err) {
                appendMessage("_Error: Could not connect to AI server._");
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send';
            }
        };

        // Initial Greeting
        appendMessage("Hello! I am Gemini 3 Flash. How can I help you today?");
    </script>
</body>
</html>
