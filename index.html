<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro — Your AI Assistant</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #18181b; /* Zinc 900 */
            --accent: #6366f1;  /* Indigo 500 */
            --bg-main: #ffffff;
            --bg-subtle: #fafafa;
            --text-main: #09090b;
            --text-muted: #71717a;
            --border: #e4e4e7;
            --radius: 0.75rem;
            --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Full Screen Layout */
        .app-header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-weight: 600;
            font-size: 1.125rem;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        .actions { display: flex; gap: 0.75rem; align-items: center; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.875rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
        }

        .btn:hover { background: var(--bg-subtle); border-color: #d4d4d8; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #27272a; }
        .btn-ghost { border: none; background: transparent; color: var(--text-muted); padding: 0.4rem; }
        .btn-ghost:hover { background: var(--bg-subtle); color: var(--text-main); }

        /* Status */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4d4d8; }
        .status-online .status-dot { background: #10b981; }

        /* Full Screen Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            scrollbar-width: thin;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .message-user { align-self: flex-end; }
        .message-ai { align-self: flex-start; }

        .bubble {
            padding: 1.25rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.9375rem;
            line-height: 1.6;
        }

        .message-user .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-ai .bubble {
            background: var(--bg-subtle);
            color: var(--text-main);
            border-bottom-left-radius: 0;
            border: 1px solid var(--border);
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.625rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Typography */
        .prose strong { color: var(--primary); font-weight: 600; }
        .prose p { margin-bottom: 1rem; }
        .prose ul { margin: 1rem 0 1rem 1.5rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose table { border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; margin: 1.5rem 0; }
        .prose th { background: var(--bg-subtle); border-bottom: 1px solid var(--border); font-weight: 600; padding: 0.75rem; }
        .prose td { border-bottom: 1px solid var(--border); padding: 0.75rem; }
        .prose img { max-width: 300px; height: auto; border-radius: 0.5rem; margin: 1rem 0; }

        /* Full Screen Footer */
        .app-footer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .suggestions {
            display: flex;
            gap: 0.625rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .suggestion-chip {
            white-space: nowrap;
            padding: 0.4rem 0.9rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 2rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .suggestion-chip:hover { border-color: #a1a1aa; color: var(--text-main); background: var(--bg-subtle); }

        .chat-form {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-subtle);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .chat-input:focus {
            border-color: #a1a1aa;
            background: white;
            box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.05);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #debug-panel {
            background: #09090b;
            color: #a1a1aa;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            padding: 1rem 2rem;
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid #27272a;
            display: none;
        }

        @media (max-width: 768px) {
            .chat-container { padding: 1rem; }
            .app-header { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="brand">
            <i data-lucide="bot"></i>
            <span>Gemini Pro</span>
        </div>
        
        <div class="actions">
            <div id="status-container" class="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
            <button class="btn btn-secondary" onclick="newConversation()">
                <i data-lucide="plus" size="16"></i> New
            </button>
            <button class="btn btn-ghost" onclick="toggleDebug()">
                <i data-lucide="terminal" size="16"></i>
            </button>
        </div>
    </header>

    <!-- Debug Panel -->
    <div id="debug-panel"></div>

    <!-- Main Chat -->
    <main id="chat-window" class="chat-container"></main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="input-wrapper">
            <div id="suggestions-container" class="suggestions"></div>
            
            <form id="chat-form" class="chat-form">
                <input type="text" id="user-input" class="chat-input" autocomplete="off" 
                    placeholder="Ask me anything...">
                <button type="submit" id="send-btn" class="send-btn">
                    <i data-lucide="send" size="20"></i>
                </button>
            </form>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // State
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const debugPanel = document.getElementById('debug-panel');
        const statusText = document.getElementById('status-text');
        const statusContainer = document.getElementById('status-container');
        const suggestionsContainer = document.getElementById('suggestions-container');

        let userMessageHistory = []; 
        let historyIndex = -1;
        let lastUserMessage = '';

        const suggestionsDb = {
            general: ["Explain Quantum Physics ⚛️", "Write a short story ✍️", "How to bake a cake 🎂", "Help me with code 💻"]
        };

        function setStatus(text, type = 'idle') {
            statusText.textContent = text;
            statusContainer.className = `status-badge ${type === 'busy' ? 'status-online' : ''}`;
            if (type === 'error') statusContainer.style.background = '#fee2e2';
            else statusContainer.style.background = '#f1f5f9';
        }

        function dbg(type, ...parts) {
            const entry = document.createElement('div');
            entry.className = `dbg-entry dbg-${type}`;
            const ts = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `<span style="opacity: 0.5;">[${ts}]</span> ${parts.join(' ')}`;
            debugPanel.appendChild(entry);
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }

        function toggleDebug() {
            debugPanel.style.display = debugPanel.style.display === 'block' ? 'none' : 'block';
        }

        function showSuggestions() {
            suggestionsContainer.innerHTML = '';
            suggestionsDb.general.forEach(text => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.textContent = text;
                chip.onclick = () => {
                    userInput.value = text;
                    chatForm.dispatchEvent(new Event('submit'));
                };
                suggestionsContainer.appendChild(chip);
            });
        }

        function appendMessage(text, isUser = false, meta = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'message-user' : 'message-ai'}`;

            const bubble = document.createElement('div');
            bubble.className = `bubble ${!isUser ? 'prose' : ''}`;
            
            // Cleanup redundant whitespace
            const cleanText = text.replace(/\n{3,}/g, '\n\n').trim();
            bubble.innerHTML = isUser ? cleanText : marked.parse(cleanText);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            
            if (isUser) {
                metaDiv.innerHTML = `
                    <span>You</span>
                    <button class="btn-ghost" style="padding:0; font-size:10px; cursor:pointer" onclick="sendMessage('${text.replace(/'/g, "\\'")}')">
                        <i data-lucide="rotate-ccw" size="10"></i> Resend
                    </button>
                `;
            } else {
                metaDiv.innerHTML = `
                    <span><i data-lucide="sparkles" size="10"></i> ${meta.model || 'Gemini'}</span>
                    <span>${meta.latency ? meta.latency + 'ms' : ''}</span>
                    <button class="btn-ghost" style="padding:0; font-size:10px; cursor:pointer" onclick="resendLast()">Resend</button>
                `;
            }

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(metaDiv);
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();
        }

        function sendMessage(msg) {
            userInput.value = msg;
            chatForm.dispatchEvent(new Event('submit'));
        }

        function resendLast() {
            if (lastUserMessage) sendMessage(lastUserMessage);
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (userMessageHistory.length > 0) {
                    historyIndex = (historyIndex === -1) ? userMessageHistory.length - 1 : Math.max(0, historyIndex - 1);
                    userInput.value = userMessageHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex !== -1) {
                    historyIndex++;
                    if (historyIndex >= userMessageHistory.length) {
                        historyIndex = -1;
                        userInput.value = '';
                    } else {
                        userInput.value = userMessageHistory[historyIndex];
                    }
                }
            }
        });

        function newConversation() {
            chatWindow.innerHTML = '';
            userMessageHistory = [];
            historyIndex = -1;
            appendMessage("Hello! I am your AI assistant. I can help with coding, writing, research, or just general chat. What's on your mind?");
            showSuggestions();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;

            if (userMessageHistory[userMessageHistory.length - 1] !== msg) userMessageHistory.push(msg);
            historyIndex = -1;
            lastUserMessage = msg;
            
            appendMessage(msg, true);
            userInput.value = '';
            sendBtn.disabled = true;
            setStatus('Thinking...', 'busy');
            dbg('info', `Sending request: ${msg.slice(0, 50)}...`);

            const t0 = performance.now();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                const data = await res.json();
                const latency = Math.round(performance.now() - t0);

                if (res.ok) {
                    appendMessage(data.reply, false, { model: data.model_used, latency });
                    setStatus('Ready');
                } else {
                    throw new Error(data.reply || 'Server error');
                }
            } catch (err) {
                dbg('error', err.message);
                appendMessage(`_Error: ${err.message}_`);
                setStatus('Error', 'error');
            } finally {
                sendBtn.disabled = false;
            }
        };

        newConversation();
    </script>
</body>
</html>
