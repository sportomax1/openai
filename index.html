<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro — Your AI Assistant</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #18181b; /* Zinc 900 */
            --accent: #6366f1;  /* Indigo 500 */
            --bg-main: #ffffff;
            --bg-subtle: #fafafa;
            --text-main: #09090b;
            --text-muted: #71717a;
            --border: #e4e4e7;
            --radius: 0.75rem;
            --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Full Screen Layout */
        .app-header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-weight: 600;
            font-size: 1.125rem;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        .actions { display: flex; gap: 0.75rem; align-items: center; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.875rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
        }

        .btn:hover { background: var(--bg-subtle); border-color: #d4d4d8; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #27272a; }
        .btn-ghost { border: none; background: transparent; color: var(--text-muted); padding: 0.4rem; }
        .btn-ghost:hover { background: var(--bg-subtle); color: var(--text-main); }

        /* Smooth animations */
        .bubble { transition: transform 160ms ease, opacity 160ms ease; }
        .message { transition: margin 160ms ease; }
        html, body { scroll-behavior: smooth; }

        /* Status */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        .status-badge.busy { gap: 0.5rem; }
        .status-spinner {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.08);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4d4d8; }
        .status-online .status-dot { background: #10b981; }

        /* Full Screen Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            scrollbar-width: thin;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .message-user { align-self: flex-end; }
        .message-ai { align-self: flex-start; }

        .bubble {
            padding: 1.25rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.9375rem;
            line-height: 1.6;
        }

        .message-user .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-ai .bubble {
            background: var(--bg-subtle);
            color: var(--text-main);
            border-bottom-left-radius: 0;
            border: 1px solid var(--border);
        }

        /* Skeleton / Shimmer */
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #edeff2 37%, #f3f4f6 63%);
            background-size: 400% 100%;
            animation: shimmer 1.2s linear infinite;
            border-radius: 8px;
            height: 1rem;
            margin: 0.5rem 0;
        }
        @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

        .typing-dots { display: inline-flex; gap: 6px; align-items: center; }
        .typing-dots span {
            width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; opacity: 0.9;
            transform: translateY(0);
            animation: bounce 1s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5 } 40% { transform: translateY(-6px); opacity: 1 } }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.625rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .action-chips { display: flex; gap: 0.5rem; margin-left: 0.25rem; }
        .chip { padding: 0.2rem 0.6rem; background: white; border: 1px solid var(--border); border-radius: 999px; font-size: 0.75rem; cursor: pointer; color: var(--text-muted); }
        .chip:hover { background: var(--bg-subtle); color: var(--text-main); }

        /* Collapsed long messages */
        .collapsed .bubble { max-height: 6.5rem; overflow: hidden; position: relative; }
        .show-more { margin-top: 0.5rem; cursor: pointer; color: var(--accent); font-weight: 600; font-size: 0.85rem; }

        /* Typography */
        .prose strong { color: var(--primary); font-weight: 600; }
        .prose p { margin-bottom: 1rem; }
        .prose ul { margin: 1rem 0 1rem 1.5rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose table { border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; margin: 1.5rem 0; }
        .prose th { background: var(--bg-subtle); border-bottom: 1px solid var(--border); font-weight: 600; padding: 0.75rem; }
        .prose td { border-bottom: 1px solid var(--border); padding: 0.75rem; }
        .prose img { max-width: 300px; height: auto; border-radius: 0.5rem; margin: 1rem 0; }

        /* Full Screen Footer */
        .app-footer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .suggestions {
            display: flex;
            gap: 0.625rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .suggestion-chip {
            white-space: nowrap;
            padding: 0.4rem 0.9rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 2rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .suggestion-chip:hover { border-color: #a1a1aa; color: var(--text-main); background: var(--bg-subtle); }

        .chat-form {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-subtle);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .chat-input:focus {
            border-color: #a1a1aa;
            background: white;
            box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.05);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #debug-panel {
            background: #09090b;
            color: #a1a1aa;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            padding: 1rem 2rem;
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid #27272a;
            display: none;
        }

        @media (max-width: 768px) {
            .chat-container { padding: 1rem; }
            .app-header { padding: 0.75rem 1rem; }
        }

        /* Modal (Help / Onboarding) */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: min(760px, 96%); border-radius: 12px; padding: 1.25rem; box-shadow: 0 8px 30px rgba(2,6,23,0.2); }
        .modal h3 { margin-bottom: 0.5rem; }
        .modal .persona { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .modal .persona button { padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--border); background:var(--bg-subtle); cursor:pointer; }
        .modal-backdrop.show { display: flex; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="brand">
            <i data-lucide="bot"></i>
            <span>Gemini Pro</span>
        </div>
        
        <div class="actions">
            <div id="status-container" class="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
            <button class="btn btn-secondary" onclick="newConversation()">
                <i data-lucide="plus" size="16"></i> New
            </button>
            <button id="help-btn" class="btn btn-ghost" onclick="showHelpModal()">
                <i data-lucide="help-circle" size="16"></i>
            </button>
            <button id="cancel-btn" class="btn btn-ghost" style="display:none;" onclick="cancelRequest()">
                <i data-lucide="x" size="16"></i> Cancel
            </button>
            <button class="btn btn-ghost" onclick="toggleDebug()">
                <i data-lucide="terminal" size="16"></i>
            </button>
        </div>
    </header>

    <!-- Debug Panel -->
    <div id="debug-panel"></div>

    <!-- Help / Onboarding Modal -->
    <div id="help-backdrop" class="modal-backdrop" onclick="hideHelpModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>Welcome — Quick Start</h3>
            <p>Try one of these example prompts or pick a persona to start:</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
                <button class="btn" onclick="useExample('Explain quantum entanglement in simple terms')">Explain quantum entanglement</button>
                <button class="btn" onclick="useExample('Help me write a professional email requesting a raise')">Write an email</button>
                <button class="btn" onclick="useExample('Debug this JavaScript error: TypeError...')">Debug JS</button>
            </div>
            <div>
                <strong>Personas:</strong>
                <div class="persona" style="margin-top:0.5rem;">
                    <button onclick="setPersona('Concise Expert')">Concise Expert</button>
                    <button onclick="setPersona('Friendly Tutor')">Friendly Tutor</button>
                    <button onclick="setPersona('Step-by-step Coach')">Step-by-step Coach</button>
                </div>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:0.75rem;gap:0.5rem;">
                <button class="btn btn-ghost" onclick="hideHelpModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Main Chat -->
    <main id="chat-window" class="chat-container"></main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="input-wrapper">
            <div id="suggestions-container" class="suggestions"></div>
            
            <form id="chat-form" class="chat-form">
                <input type="text" id="user-input" class="chat-input" autocomplete="off" 
                    placeholder="Ask me anything...">
                <button type="submit" id="send-btn" class="send-btn">
                    <i data-lucide="send" size="20"></i>
                </button>
            </form>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // State
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const debugPanel = document.getElementById('debug-panel');
        const statusText = document.getElementById('status-text');
        const statusContainer = document.getElementById('status-container');
        const suggestionsContainer = document.getElementById('suggestions-container');

        let userMessageHistory = []; 
        let historyIndex = -1;
        let lastUserMessage = '';

        const suggestionsDb = {
            general: ["Explain Quantum Physics ⚛️", "Write a short story ✍️", "How to bake a cake 🎂", "Help me with code 💻"]
        };

        function setStatus(text, type = 'idle') {
            statusText.textContent = text;
            statusContainer.className = `status-badge ${type === 'busy' ? 'status-online' : ''}`;
            if (type === 'error') statusContainer.style.background = '#fee2e2';
            else statusContainer.style.background = '#f1f5f9';
        }

        // Settings (persisted)
        const uiSettings = {
            dots: true,
            skeleton: true,
            spinner: true,
            sound: false,
        };
        try { const saved = JSON.parse(localStorage.getItem('uiSettings')); if (saved) Object.assign(uiSettings, saved); } catch(e){}
        function saveSettings() { localStorage.setItem('uiSettings', JSON.stringify(uiSettings)); }

        function dbg(type, ...parts) {
            const entry = document.createElement('div');
            entry.className = `dbg-entry dbg-${type}`;
            const ts = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `<span style="opacity: 0.5;">[${ts}]</span> ${parts.join(' ')}`;
            debugPanel.appendChild(entry);
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }

        function toggleDebug() {
            debugPanel.style.display = debugPanel.style.display === 'block' ? 'none' : 'block';
        }

        function showSuggestions() {
            suggestionsContainer.innerHTML = '';
            suggestionsDb.general.forEach(text => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.textContent = text;
                chip.onclick = () => {
                    userInput.value = text;
                    chatForm.dispatchEvent(new Event('submit'));
                };
                suggestionsContainer.appendChild(chip);
            });
        }

        function appendMessage(text, isUser = false, meta = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'message-user' : 'message-ai'}`;

            const bubble = document.createElement('div');
            bubble.className = `bubble ${!isUser ? 'prose' : ''}`;
            
            // Cleanup redundant whitespace
            const cleanText = text.replace(/\n{3,}/g, '\n\n').trim();
            bubble.innerHTML = isUser ? cleanText : marked.parse(cleanText);

            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            
            if (isUser) {
                metaDiv.innerHTML = `
                    <span>You</span>
                    <button class="btn-ghost" style="padding:0; font-size:10px; cursor:pointer" onclick="sendMessage('${text.replace(/'/g, "\\'")}')">
                        <i data-lucide="rotate-ccw" size="10"></i> Resend
                    </button>
                `;
            } else {
                metaDiv.innerHTML = `
                    <span><i data-lucide="sparkles" size="10"></i> ${meta.model || 'Gemini'}</span>
                    <span>${meta.latency ? meta.latency + 'ms' : ''}</span>
                `;

                // action chips
                const chips = document.createElement('div'); chips.className = 'action-chips';
                const edit = document.createElement('div'); edit.className = 'chip'; edit.textContent = 'Edit'; edit.onclick = () => editReply(text);
                const examples = document.createElement('div'); examples.className = 'chip'; examples.textContent = 'Examples'; examples.onclick = () => showExamplesFor(text);
                const translate = document.createElement('div'); translate.className = 'chip'; translate.textContent = 'Translate'; translate.onclick = () => promptTranslate(text);
                const retry = document.createElement('div'); retry.className = 'chip'; retry.textContent = 'Retry'; retry.onclick = () => retryMessage(lastUserMessage);
                chips.appendChild(edit); chips.appendChild(examples); chips.appendChild(translate); chips.appendChild(retry);
                metaDiv.appendChild(chips);
            }

            // Collapse long AI messages
            if (!isUser && cleanText.length > 400) {
                const truncated = cleanText.slice(0, 400) + '…';
                bubble.innerHTML = marked.parse(truncated);
                const more = document.createElement('div'); more.className = 'show-more'; more.textContent = 'Show more';
                more.onclick = () => {
                    bubble.innerHTML = marked.parse(cleanText);
                    more.remove();
                    msgDiv.classList.remove('collapsed');
                    lucide.createIcons();
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                };
                msgDiv.classList.add('collapsed');
                msgDiv.appendChild(bubble);
                msgDiv.appendChild(more);
                msgDiv.appendChild(metaDiv);
            } else {
                msgDiv.appendChild(bubble);
                msgDiv.appendChild(metaDiv);
            }
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();
        }

        // Edit reply into input for quick modification
        function editReply(text) {
            userInput.value = text.replace(/\n/g, ' ');
            userInput.focus();
        }

        // Show example follow-ups for a given reply
        function showExamplesFor(text) {
            suggestionsContainer.innerHTML = '';
            const examples = [
                'Can you summarize that?',
                'Give me a short bullet list of key points.',
                'Explain like I am 5 years old.'
            ];
            examples.forEach(ex => {
                const chip = document.createElement('div'); chip.className = 'suggestion-chip'; chip.textContent = ex;
                chip.onclick = () => { userInput.value = ex; chatForm.dispatchEvent(new Event('submit')); };
                suggestionsContainer.appendChild(chip);
            });
        }

        function promptTranslate(text) {
            const lang = prompt('Translate to which language? (e.g., Spanish, French)');
            if (!lang) return;
            userInput.value = `Translate the following to ${lang}:\n\n${text}`;
            chatForm.dispatchEvent(new Event('submit'));
        }

        function retryMessage(msg) { if (msg) sendMessage(msg); }

        // Create a thinking placeholder and return an object to clear it
        function createThinkingPlaceholder() {
            const placeholder = document.createElement('div');
            placeholder.className = 'message message-ai thinking-placeholder';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // Conditionally add skeleton lines / dots based on settings
            if (uiSettings.skeleton) {
                const line1 = document.createElement('div'); line1.className = 'skeleton'; line1.style.width = '60%';
                const line2 = document.createElement('div'); line2.className = 'skeleton'; line2.style.width = '85%';
                const line3 = document.createElement('div'); line3.className = 'skeleton'; line3.style.width = '40%';
                bubble.appendChild(line1); bubble.appendChild(line2); bubble.appendChild(line3);
            }
            if (uiSettings.dots) {
                const dots = document.createElement('div'); dots.className = 'typing-dots';
                dots.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(dots);
            }

            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            metaDiv.innerHTML = `<span id="thinking-meta">Thinking...</span>`;

            placeholder.appendChild(bubble);
            placeholder.appendChild(metaDiv);
            chatWindow.appendChild(placeholder);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            return placeholder;
        }

        // Abort controller for canceling current request
        let currentController = null;

        function cancelRequest() {
            if (currentController) {
                try { currentController.abort(); } catch(e){}
                currentController = null;
                const cancelBtn = document.getElementById('cancel-btn'); if (cancelBtn) cancelBtn.style.display = 'none';
                stopThinkingTimer();
                appendMessage('_Request cancelled by user_', false);
                sendBtn.disabled = false;
            }
        }

        let _thinkingTimerId = null;
        let _thinkingStart = 0;
        function startThinkingTimer() {
            _thinkingStart = performance.now();
            statusContainer.classList.add('busy');
            statusContainer.classList.add('status-online');
            statusContainer.classList.add('busy');
            // add spinner if not present
            if (!document.getElementById('status-spinner')) {
                const sp = document.createElement('div'); sp.id = 'status-spinner'; sp.className = 'status-spinner';
                statusContainer.insertBefore(sp, statusContainer.firstChild);
            }
            _thinkingTimerId = setInterval(() => {
                const elapsed = ((performance.now() - _thinkingStart) / 1000).toFixed(1);
                statusText.textContent = `Thinking... ${elapsed}s`;
                const meta = document.getElementById('thinking-meta'); if (meta) meta.textContent = `Thinking... ${elapsed}s`;
            }, 200);
        }

        function stopThinkingTimer() {
            clearInterval(_thinkingTimerId); _thinkingTimerId = null;
            statusText.textContent = 'Ready';
            const sp = document.getElementById('status-spinner'); if (sp) sp.remove();
            statusContainer.classList.remove('busy');
            statusContainer.classList.remove('status-online');
            const meta = document.getElementById('thinking-meta'); if (meta) meta.textContent = '';
        }

        function sendMessage(msg) {
            userInput.value = msg;
            chatForm.dispatchEvent(new Event('submit'));
        }

        function resendLast() {
            if (lastUserMessage) sendMessage(lastUserMessage);
        }

        // Help modal handlers
        function showHelpModal() { document.getElementById('help-backdrop').classList.add('show'); }
        function hideHelpModal() { document.getElementById('help-backdrop').classList.remove('show'); }
        function useExample(text) { hideHelpModal(); userInput.value = text; chatForm.dispatchEvent(new Event('submit')); }
        function setPersona(name) { hideHelpModal(); appendMessage(`Persona set: ${name}`, false); }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (userMessageHistory.length > 0) {
                    historyIndex = (historyIndex === -1) ? userMessageHistory.length - 1 : Math.max(0, historyIndex - 1);
                    userInput.value = userMessageHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex !== -1) {
                    historyIndex++;
                    if (historyIndex >= userMessageHistory.length) {
                        historyIndex = -1;
                        userInput.value = '';
                    } else {
                        userInput.value = userMessageHistory[historyIndex];
                    }
                }
            }
        });

        function newConversation() {
            chatWindow.innerHTML = '';
            userMessageHistory = [];
            historyIndex = -1;
            appendMessage("Hello! I am your AI assistant. I can help with coding, writing, research, or just general chat. What's on your mind?");
            showSuggestions();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg) return;

            if (userMessageHistory[userMessageHistory.length - 1] !== msg) userMessageHistory.push(msg);
            historyIndex = -1;
            lastUserMessage = msg;
            
            appendMessage(msg, true);
            userInput.value = '';
            sendBtn.disabled = true;
            dbg('info', `Sending request: ${msg.slice(0, 50)}...`);

            // Show thinking placeholder + start elapsed timer
            const placeholder = createThinkingPlaceholder();
            startThinkingTimer();
            // show cancel button and create abort controller
            const cancelBtn = document.getElementById('cancel-btn'); if (cancelBtn) cancelBtn.style.display = 'inline-flex';
            const controller = new AbortController(); currentController = controller;

            const t0 = performance.now();
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg }),
                    signal: controller.signal,
                });

                const data = await res.json();
                const latency = Math.round(performance.now() - t0);

                // remove placeholder
                if (placeholder && placeholder.remove) placeholder.remove();
                stopThinkingTimer();
                const cancelBtn2 = document.getElementById('cancel-btn'); if (cancelBtn2) cancelBtn2.style.display = 'none';
                currentController = null;

                if (res.ok) {
                    appendMessage(data.reply, false, { model: data.model_used, latency });
                } else {
                    throw new Error(data.reply || 'Server error');
                }
            } catch (err) {
                dbg('error', err.message);
                if (placeholder && placeholder.remove) placeholder.remove();
                stopThinkingTimer();
                const cancelBtn3 = document.getElementById('cancel-btn'); if (cancelBtn3) cancelBtn3.style.display = 'none';
                // Handle abort separately
                if (err.name === 'AbortError') {
                    appendMessage('_Request aborted_', false);
                } else {
                    appendMessage(`_Error: ${err.message}_`);
                    setStatus('Error', 'error');
                }
                currentController = null;
            } finally {
                sendBtn.disabled = false;
            }
        };

        newConversation();
    </script>
</body>
</html>
